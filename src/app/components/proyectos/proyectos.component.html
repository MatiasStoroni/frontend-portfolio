<!-- Portfolio Section-->
<section class="page-section bg-white portfolio" id="portfolio">
    <div class="container">
        <!-- Portfolio Section Heading-->
        <h2 class="page-section-heading text-center text-uppercase text-secondary mb-0">Proyectos</h2>
        <!-- Icon Divider-->
        <div class="divider-custom">
            <div class="divider-custom-line"></div>
            <div class="divider-custom-icon"><i class="fas fa-star"></i></div>
            <div class="divider-custom-line"></div>
        </div>
        <button *ngIf="isLogged" type="button" class="btn btn-info" routerLink="/new-proyecto"><i
                class="fa-solid fa-plus"></i>Crear nuevo</button>
        <!-- Portfolio Grid Items-->
        <div class="row justify-content-center">
            <!-- Portfolio Item 1-->
            <div class="text-center col-md-6 col-lg-3 mb-5" *ngFor="let p of proyectos">
                <div class="card bg-primary">
                    <img class="card-img-top bg-white" width="200em" height="200em" style="border-radius: 10px;"
                        src="https://firebasestorage.googleapis.com/v0/b/web-portfolio-matias-storoni.appspot.com/o/images%2F{{p.imagen}}?alt=media"
                        alt="Logo de institucion">
                    <div class="card-body bg-secondary">
                        <h6 style="color:coral">{{p.titulo}}</h6>
                        <h6 style="color:rgb(207, 198, 194)">{{p.descripcion}}</h6>
                        <div class="editar-portfolio" *ngIf="isLogged">
                            <button type="button" class="btn btn-warning m-6" routerLink="/edit-proyecto"
                                (click)="guardarActual(p)"><i class="fa-solid fa-pen-to-square"></i></button>
                            <button type="button" class="btn btn-danger" (click)="borrar(p.id)"><i
                                    class="fa-sharp fa-solid fa-trash"></i></button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
